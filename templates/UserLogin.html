{% extends 'base.html' %}
{% load static %}

{% block contents %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="glass-form-card col-12 col-md-6 col-lg-5 text-center">
        <h2>User Login</h2>
        <form action="{% url 'UserLoginCheck' %}" method="POST">
            {% csrf_token %}
            <div class="form-group mt-4">
                <input type="text" class="form-control py-4" name="loginid" required placeholder="Enter Login Id">
            </div>
            <div class="form-group mt-3">
                <input type="password" class="form-control py-4" name="pswd" required placeholder="Enter Password">
            </div>
            <button type="submit" class="btn btn-primary btn-block py-2 mt-4" style="border-radius: 999px; font-weight: 600; background: linear-gradient(135deg, var(--primary-teal), var(--primary-teal-dark)); border: none;">Sign In</button>
            
            {% if messages %}
                <div class="mt-4">
                    {% for message in messages %}
                        <div class="alert alert-info py-2" style="background: rgba(20, 184, 166, 0.2); border: 1px solid rgba(20, 184, 166, 0.3); color: white;">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
