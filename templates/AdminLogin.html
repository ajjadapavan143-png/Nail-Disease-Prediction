{% extends 'base.html' %}
{% load static %}

{% block contents %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="glass-form-card col-12 col-md-6 col-lg-5 text-center">
        <h2>Admin Login</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group mt-4">
                <input type="text" class="form-control py-4" name="login_id" placeholder="Enter Login Id" required>
            </div>
            <div class="form-group mt-3">
                <input type="password" class="form-control py-4" name="password" placeholder="Enter Password" required>
            </div>
            <div class="d-flex justify-content-between mt-4">
                <button type="submit" class="btn btn-primary flex-grow-1 mr-2 py-2" style="border-radius: 999px; font-weight: 600; background: linear-gradient(135deg, var(--primary-teal), var(--primary-teal-dark)); border: none;">Login</button>
                <button type="reset" class="btn btn-secondary flex-grow-1 ml-2 py-2" style="border-radius: 999px; background: rgba(255,255,255,0.2); border: none; font-weight: 600; color: white;">Reset</button>
            </div>
            
            {% if messages %}
                <div class="mt-4">
                    {% for message in messages %}
                        <div class="alert alert-info py-2" style="background: rgba(20, 184, 166, 0.2); border: 1px solid rgba(20, 184, 166, 0.3); color: white;">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
