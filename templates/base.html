{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Disease Classification</title>
    <!-- Bring in Bootstrap for grid layout compatibility with existing pages -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/homestyle.css' %}?v=1.1">
    
    <!-- PWA Setup -->
    <link rel="manifest" href="{% static 'manifest.json' %}">
    <meta name="theme-color" content="#14b8a6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .page-wrapper {
            position: relative;
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?q=80&w=2080&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }
        .page-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 58, 138, 0.75) 100%);
            z-index: 1;
            position: fixed;
        }
        .content-z {
            z-index: 2;
            position: relative;
            flex-grow: 1;
        }
        .glass-form-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: var(--light-text);
            margin-top: 120px;
            margin-bottom: 50px;
        }
        .glass-form-card h2, .glass-form-card h1 {
            color: #fff; margin-bottom: 1.5rem; font-weight: 700;
        }
        .glass-form-card .form-control {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; width: 100%;
        }
        .glass-form-card .form-control:focus {
            background: rgba(255, 255, 255, 0.15); border-color: var(--primary-teal); color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(20, 184, 166, 0.25);
        }
        .glass-form-card .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .navbar {
            padding: 1.25rem 5% !important;
        }
        .glass-form-card table { margin: auto; }
        .glass-form-card table td { padding: 10px; color: white; text-align: left; vertical-align: middle; }
        
        /* Mobile Menu Setup */
        .mobile-menu { display: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .nav-container { display: flex; align-items: center; gap: 0.5rem; }
        @media (max-width: 768px) {
            .mobile-menu { display: block; }
            .nav-container { 
                display: none; 
                flex-direction: column; 
                width: 100%; 
                position: absolute; 
                top: 100%; left: 0; 
                background: rgba(15, 23, 42, 0.98); 
                padding: 1rem 0; 
                border-top: 1px solid rgba(255,255,255,0.1);
                border-bottom: 1px solid rgba(255,255,255,0.1);
                box-shadow: 0 10px 15px rgba(0,0,0,0.5);
                z-index: 9999;
            }
            .nav-container.active { display: flex; }
            .btn-outline { width: auto; min-width: 160px; text-align: center; margin: 0.25rem auto; padding: 0.5rem 1rem; font-size: 0.85rem !important; }
            .navbar { flex-wrap: wrap !important; padding: 1rem 5% !important; z-index: 1000; }
            .glass-form-card { margin-top: 100px !important; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="page-overlay"></div>
        
        <!-- Dark Transparent Navbar -->
        <nav class="navbar content-z">
            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                <div class="logo">
                    <i class="fa-solid fa-microscope"></i>
                    <span style="margin-left:8px;">NailCare AI</span>
                </div>
                <div class="mobile-menu" onclick="document.getElementById('nav-menu').classList.toggle('active')">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </div>
            
            <div id="nav-menu" class="nav-container">
                <a href="{% url 'index' %}" class="btn-outline">Home</a>
                <a href="{% url 'AdminLogin' %}" class="btn-outline">Admin Login</a>
                <a href="{% url 'UserLogin' %}" class="btn-outline">Sign In</a>
                <a href="{% url 'UserRegisterForm' %}" class="btn-outline">Register</a>
            </div>
        </nav>

        <div class="content-z">
            {% block contents %}
            {% endblock %}
        </div>
        

    </div>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register("{% static 'service-worker.js' %}").then(function(registration) {
            console.log('ServiceWorker registration successful');
          }, function(err) {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
</body>
</html>
