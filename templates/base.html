{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Disease Classification</title>
    <!-- Bring in Bootstrap for grid layout compatibility with existing pages -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/homestyle.css' %}">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .page-wrapper {
            position: relative;
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?q=80&w=2080&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }
        .page-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 58, 138, 0.75) 100%);
            z-index: 1;
            position: fixed;
        }
        .content-z {
            z-index: 2;
            position: relative;
            flex-grow: 1;
        }
        .glass-form-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: var(--light-text);
            margin-top: 120px;
            margin-bottom: 50px;
        }
        .glass-form-card h2, .glass-form-card h1 {
            color: #fff; margin-bottom: 1.5rem; font-weight: 700;
        }
        .glass-form-card .form-control {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; width: 100%;
        }
        .glass-form-card .form-control:focus {
            background: rgba(255, 255, 255, 0.15); border-color: var(--primary-teal); color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(20, 184, 166, 0.25);
        }
        .glass-form-card .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .navbar {
            padding: 1.25rem 5% !important;
        }
        .glass-form-card table { margin: auto; }
        .glass-form-card table td { padding: 10px; color: white; text-align: left; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="page-overlay"></div>
        
        <!-- Dark Transparent Navbar -->
        <nav class="navbar content-z">
            <div class="logo">
                <i class="fa-solid fa-microscope"></i>
                <span style="margin-left:8px;">NailCare AI</span>
            </div>
            <div class="d-flex align-items-center" style="gap: 1rem;">
                <a href="{% url 'index' %}" class="btn-outline">Home</a>
                <a href="{% url 'AdminLogin' %}" class="btn-outline">Admin Login</a>
                <a href="{% url 'UserLogin' %}" class="btn-outline">Sign In</a>
                <a href="{% url 'UserRegisterForm' %}" class="btn-outline">Register</a>
            </div>
        </nav>

        <div class="content-z">
            {% block contents %}
            {% endblock %}
        </div>
        

    </div>
</body>
</html>
